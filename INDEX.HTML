<!DOCTYPE html>

<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Padanito - Calculadora</title>

  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>

<body>

  <h1>Calculadora de Costos Padanito</h1>

  <h2>Regla de Tres</h2>
  <input type="number" id="valor1" placeholder="Valor 1">
  <input type="number" id="valor2" placeholder="Valor 2">
  <input type="number" id="valor3" placeholder="Valor 3">
  <button onclick="calcular()">Calcular</button>

  <p id="resultado"></p>

  <h2>Ingredientes por Unidad</h2>

  <input type="text" placeholder="Ingrediente 1">
  <input type="text" placeholder="Ingrediente 2">
  <input type="text" placeholder="Ingrediente 3">
  <input type="text" placeholder="Ingrediente 4">
  <input type="text" placeholder="Ingrediente 5">
  <input type="text" placeholder="Ingrediente 6">

<br><br> <button onclick="limpiar()">Limpiar</button>

  <script src="script.js"></script>

</body>
</html>
